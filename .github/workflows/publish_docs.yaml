name: Ballerina Integrator Docs Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: en/package-lock.json

      - name: Install dependencies
        run: |
          cd en/
          npm ci

      - name: Build Docusaurus site
        run: |
          cd en/
          npm run build
        env:
          BASE_URL: /docs-integrator/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: en/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
